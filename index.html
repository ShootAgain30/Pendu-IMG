<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
:root {
  --bg: #0f0c1a; --accent: #e8ff47; --accent2: #ff4757; --accent3: #48dbfb;
  --text: #f0ebff; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }

.app { height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 10px; max-width: 480px; margin: 0 auto; }

/* Potence Taille Normale */
.gallows-wrap { width:100%; display:flex; justify-content:center; margin-bottom:10px; flex-shrink:0; }
#gallows-svg { width:180px; height:130px; }

.word-display { display:flex; gap:8px; justify-content:center; margin-bottom:10px; min-height:40px; }
.letter-slot { display:flex; flex-direction:column; align-items:center; }
.letter-char { font-size:1.6rem; min-width:24px; text-align:center; height: 30px; }
.letter-line { height:2px; background:rgba(255,255,255,0.2); width:24px; }
.letter-line.revealed { background:var(--accent); }

/* ZONE BASSE : FORCE L'ORDRE CLAVIER PUIS BOUTONS */
.bottom-container {
  margin-top: auto;
  width: 100%;
  display: flex;
  flex-direction: column; /* Aligne les éléments verticalement */
  gap: 20px; /* Espace fixe entre le clavier et les boutons */
  padding-bottom: 25px;
}

.keyboard { 
  display:flex; 
  flex-direction:column; 
  gap:6px; 
}

.key-row { display:flex; justify-content:center; gap:4px; }
.key { 
  background:var(--card); border:1px solid var(--border); color:var(--text); 
  width:34px; height:42px; border-radius:6px; display:flex; 
  align-items:center; justify-content:center; font-size: 0.9rem; 
}
.key.correct { color:var(--accent); border-color:var(--accent); }
.key.wrong { opacity: 0.2; }

.audio-row { 
  display: flex; 
  justify-content: center; 
  gap: 15px; 
}
.audio-btn { 
  background: rgba(232,255,71,0.1); border: 1px solid var(--accent); 
  color: var(--accent); padding: 10px 20px; border-radius: 20px; font-size: 0.75rem; 
}

/* Overlays */
.overlay { position:fixed; inset:0; background:rgba(15,12,26,0.98); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:20px; }
.hidden { display:none; }
.fs-layer { position:fixed; inset:0; background:#000; z-index:1000; display:none; align-items:center; justify-content:center; }
.fs-layer video, .fs-layer img { width:100%; height:100%; object-fit:contain; }
</style>
</head>
<body>

<div class="app">
  <div style="font-size:1.6rem; color:var(--accent); margin-bottom:10px; font-weight:bold;">LE PENDU</div>
  
  <div class="gallows-wrap">
    <svg id="gallows-svg" viewBox="0 0 220 160">
      <line x1="20" y1="155" x2="200" y2="155" stroke="white" stroke-opacity="0.2" stroke-width="3"/>
      <line x1="60" y1="155" x2="60" y2="10" stroke="white" stroke-opacity="0.2" stroke-width="3"/>
      <line x1="60" y1="10" x2="140" y2="10" stroke="white" stroke-opacity="0.2" stroke-width="3"/>
      <circle id="p-head" cx="140" cy="44" r="14" stroke="#ff4757" stroke-width="2.5" opacity="0"/>
      <line id="p-body" x1="140" y1="58" x2="140" y2="100" stroke="#ff4757" stroke-width="2.5" opacity="0"/>
      <line id="p-larm" x1="140" y1="70" x2="118" y2="90" stroke="#ff4757" stroke-width="2.5" opacity="0"/>
      <line id="p-rarm" x1="140" y1="70" x2="162" y2="90" stroke="#ff4757" stroke-width="2.5" opacity="0"/>
      <line id="p-lleg" x1="140" y1="100" x2="118" y2="130" stroke="#ff4757" stroke-width="2.5" opacity="0"/>
      <line id="p-rleg" x1="140" y1="100" x2="162" y2="130" stroke="#ff4757" stroke-width="2.5" opacity="0"/>
    </svg>
  </div>

  <div class="word-display" id="word-display"></div>

  <div class="bottom-container">
    <div class="keyboard" id="keyboard"></div>
    <div class="audio-row">
      <button class="audio-btn" id="music-btn">🎵 Musique</button>
      <button class="audio-btn" id="next-btn">⏭ Next</button>
    </div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div id="overlay-emoji" style="font-size:4rem"></div>
  <div id="overlay-title" style="font-size:2rem; font-weight:bold;"></div>
  <button id="play-again-btn" style="padding:15px 40px; background:var(--accent); border:none; border-radius:5px;">REJOUER</button>
  <button class="reward-btn" id="btn-img" style="display:none; padding:15px 40px; background:var(--accent3); border:none; border-radius:5px;">VOIR IMAGE</button>
  <button class="reward-btn" id="btn-vid" style="display:none; padding:15px 40px; background:var(--accent2); border:none; border-radius:5px;">VOIR VIDÉO</button>
</div>

<div id="fs-img" class="fs-layer" onclick="this.style.display='none'; newGame();"><img id="target-img"></div>
<div id="fs-vid" class="fs-layer" onclick="stopVid()"><video id="target-vid" controls playsinline></video></div>

<script>
// Listes de médias et logique de jeu
const IMAGE_LIST = ["img/1.jpg", "img/2.jpg", "img/3.jpg", "img/4.jpg", "img/5.jpg", "img/6.jpg", "img/7.jpg", "img/8.jpg", "img/9.jpg", "img/10.jpg", "img/11.jpg"];
const VIDEO_LIST = ["vid/1.mp4", "vid/2.mp4", "vid/3.mp4", "vid/4.mp4", "vid/5.mp4", "vid/6.mp4", "vid/7.mp4"];
const WORDS = [{word:"GUITARE"},{word:"ELEPHANT"},{word:"PIZZA"},{word:"CHOCOLAT"},{word:"FUSEE"}];
const ROWS = [['A','Z','E','R','T','Y','U','I','O','P'],['Q','S','D','F','G','H','J','K','L','M'],['W','X','C','V','B','N']];
const PARTS = ['p-head','p-body','p-larm','p-rarm','p-lleg','p-rleg'];

let W, G, E, winStreak = 0;

function newGame() {
  const e = WORDS[Math.floor(Math.random()*WORDS.length)];
  W = e.word; G = new Set(); E = 0;
  document.getElementById('overlay').classList.add('hidden');
  document.querySelectorAll('.reward-btn').forEach(b => b.style.display = 'none');
  render();
}

function guess(l) {
  if (G.has(l)) return;
  G.add(l);
  if (!W.includes(l)) E++;
  if ([...W].every(x => G.has(x))) { winStreak++; setTimeout(()=>end(true), 400); }
  else if (E >= 6) { winStreak = 0; setTimeout(()=>end(false), 400); }
  render();
}

function end(won) {
  document.getElementById('overlay-emoji').textContent = won ? '🎉' : '💀';
  document.getElementById('overlay-title').textContent = won ? 'BRAVO' : 'PERDU';
  if (won && winStreak > 0 && winStreak % 2 === 0) {
    document.getElementById('btn-img').style.display = 'block';
    document.getElementById('target-img').src = IMAGE_LIST[Math.floor(Math.random()*IMAGE_LIST.length)];
  } else if (!won) {
    document.getElementById('btn-vid').style.display = 'block';
    document.getElementById('target-vid').src = VIDEO_LIST[Math.floor(Math.random()*VIDEO_LIST.length)];
  }
  document.getElementById('overlay').classList.remove('hidden');
}

function render() {
  PARTS.forEach((id,i) => document.getElementById(id).style.opacity = E > i ? '1' : '0');
  const wd = document.getElementById('word-display'); wd.innerHTML = '';
  for (const l of W) {
    const s=document.createElement('div'); s.className='letter-slot';
    const ch=document.createElement('div'); ch.className='letter-char'; ch.textContent = G.has(l) ? l : '';
    const ln=document.createElement('div'); ln.className='letter-line'+(G.has(l)?' revealed':'');
    s.appendChild(ch); s.appendChild(ln); wd.appendChild(s);
  }
  const kb = document.getElementById('keyboard'); kb.innerHTML = '';
  ROWS.forEach(row => {
    const r=document.createElement('div'); r.className='key-row';
    row.forEach(l => {
      const b=document.createElement('button'); b.className='key'; b.textContent=l;
      if(G.has(l)) b.classList.add(W.includes(l)?'correct':'wrong');
      b.onclick = () => guess(l); r.appendChild(b);
    });
    kb.appendChild(r);
  });
}

document.getElementById('btn-img').onclick = () => document.getElementById('fs-img').style.display='flex';
document.getElementById('btn-vid').onclick = () => { document.getElementById('fs-vid').style.display='flex'; const v=document.getElementById('target-vid'); v.load(); v.play(); };
function stopVid() { const v=document.getElementById('target-vid'); v.pause(); document.getElementById('fs-vid').style.display='none'; newGame(); }
document.getElementById('play-again-btn').onclick = newGame;

const tracks = ['01.mp3', '02.mp3', '03.mp3'];
let tIdx = 0; const player = new Audio();
document.getElementById('music-btn').onclick = function() {
  if(player.paused) { player.src=tracks[tIdx]; player.play(); this.textContent='🔇 Stop'; }
  else { player.pause(); this.textContent='🎵 Musique'; }
};
document.getElementById('next-btn').onclick = () => { tIdx=(tIdx+1)%tracks.length; player.src=tracks[tIdx]; player.play(); };

newGame();
</script>
</body>
</html>
